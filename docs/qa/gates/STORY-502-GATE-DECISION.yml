## Known Issues & Limitations

### Minor Issues (Will Not Block)

1. **Load Test Execution**
   - Requires server running (`npm run dev:server`)
   - Baseline expectations documented
   - Recommendation: Run manually before Phase 5 launch

2. **Metrics Reset on Server Restart**
   - Expected behavior for MVP
   - Recommendation: Persist metrics to DB in Phase 5+ (tech debt)

3. **No Prometheus Text Format**
   - Current format is JSON (simple)
   - Recommendation: Add `/metrics/prometheus` endpoint later
   - Impact: None for current phase

### Dependencies & Prerequisites

- ✅ PostgreSQL pool already configured (Phase 4)
- ✅ Express.js server available
- ✅ Node.js 18+ (verified in package.json)
- ✅ No new external dependencies added

