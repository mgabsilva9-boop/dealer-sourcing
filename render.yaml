services:
  - type: web
    name: dealer-sourcing-api
    env: node
    plan: free
    buildCommand: npm install --production
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: https://dealer-sourcing.vercel.app
      - key: FRONTEND_URL
        value: https://dealer-sourcing.vercel.app
