services:
  # PostgreSQL Database (Render Managed)
  - type: pserv
    name: dealer-sourcing-db
    plan: starter
    database:
      name: dealer_sourcing
      version: "15"
    ipAllowList: []
    preDeployCommand: |
      node db/migrate.js apply

  # Backend API Service
  - type: web
    name: dealer-sourcing-api
    plan: starter
    runtime: node
    buildCommand: |
      npm install --production
    startCommand: |
      node src/server.js
    envVars:
      # Database connection (auto-populated)
      - key: DATABASE_URL
        fromDatabase:
          name: dealer_sourcing
          property: connectionString

      # JWT Configuration
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: JWT_EXPIRE
        value: 7d

      # Environment
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info

      # CORS Configuration
      - key: ALLOWED_ORIGINS
        value: "https://dealer-sourcing.onrender.com"

    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10

    # Auto-deployment on push
    autoDeploy: true

deploy:
  deploymentStrategy: rolling
