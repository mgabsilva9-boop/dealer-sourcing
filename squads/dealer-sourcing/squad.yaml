name: dealer-sourcing
version: 2.0.0
short-title: "Dealer Premium Vehicle Sourcing & Management Platform"
description: |
  Full-stack MVP for premium vehicle sourcing, inventory tracking, and dealer CRM.
  Phases 3-7 complete: Database, Backend (5 APIs, 40 tests), QA validated, Deployed on Render+Vercel.
  Phase 5+ tech debt and feature roadmap included.

author: "Dealer Team (@architect, @dev)"
license: MIT

slashPrefix: "/dealer"
tags:
  - "dealer"
  - "sourcing"
  - "vehicle"
  - "crm"
  - "inventory"

aios:
  minVersion: "3.0.0"
  type: "squad"
  format_version: "v2"

components:
  agents:
    - "agents/architect.md"
    - "agents/dev.md"
    - "agents/data-engineer.md"
    - "agents/ux-design-expert.md"
  tasks:
    - "tasks/sourcing-list.md"
    - "tasks/sourcing-search.md"
    - "tasks/mark-interested.md"
    - "tasks/generate-report.md"
  workflows:
    - "workflows/main-workflow.yaml"
    - "workflows/phase5-rollout.yaml"
  checklists:
    - "checklists/deployment-checklist.md"
    - "checklists/phase5-readiness.md"

config:
  coding-standards: "config/coding-standards.md"
  tech-stack: "config/tech-stack.md"
  source-tree: "config/source-tree.md"
  extends: "extend"

dependencies:
  node:
    - "node >= 18.0.0"
    - "npm >= 9.0.0"
  squads: []
  external:
    - "PostgreSQL >= 15"
    - "Render (PaaS)"
    - "Vercel (Frontend)"

metadata:
  maintainers:
    - "@architect (Aria)"
    - "@dev (Dex)"
  last_reviewed: "2026-03-28"
  status: "Phase 5 Ready"
  phases_complete:
    - "Phase 3: Database Design"
    - "Phase 4: Backend Implementation"
    - "Phase 4: QA Validation"
    - "Phase 6: Deployment"
    - "Phase 7: Frontend"
  tech_debt_tracked: true
  horizontal_scaling_ready: false
  note: |
    MVP meets Phase 4 QA sign-off (A grade, 94% confidence).
    Phase 5 roadmap: JWT real implementation, pool monitoring, distributed caching.
    Production-ready for small-scale dealer operations (10-20 concurrent users).
